name: 🔍 Static Checks

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name || github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: true

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

#      - run: pnpm install
      - run: pnpm biome ci
      - run: pnpm test
      - run: pnpm build
